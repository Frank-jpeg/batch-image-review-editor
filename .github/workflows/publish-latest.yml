name: 自动打包并发布最新版

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-latest
  cancel-in-progress: false

jobs:
  package-macos:
    name: 打包 macOS（Apple Silicon）
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: 打包 app 和 DMG
        run: |
          PYINSTALLER_CONFIG_DIR="$PWD/build/pyinstaller-cache" python -m PyInstaller --noconfirm --clean build/spec/抠图查图处理.spec
          mkdir -p release
          hdiutil create -volname "抠图查图处理" -srcfolder "dist/抠图查图处理.app" -format UDZO -ov "release/batch-image-review-editor-macos-arm64.dmg"
          ditto -c -k --sequesterRsrc --keepParent "dist/抠图查图处理.app" "release/batch-image-review-editor-macos-arm64.app.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: |
            release/batch-image-review-editor-macos-arm64.dmg
            release/batch-image-review-editor-macos-arm64.app.zip
          if-no-files-found: error

  package-windows:
    name: 打包 Windows（x64）
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: 打包单文件 exe
        shell: pwsh
        run: |
          $env:PYTHONUTF8 = "1"
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name "抠图查图处理-Windows-x64" --add-data "source-info.json;." "src/抠图查图处理_mac.py"
          New-Item -ItemType Directory -Force release | Out-Null
          Move-Item "dist/抠图查图处理-Windows-x64.exe" "release/batch-image-review-editor-windows-x64.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: release/batch-image-review-editor-windows-x64.exe
          if-no-files-found: error

  publish-release:
    name: 更新最新版下载
    needs: [package-macos, package-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
      - name: 清理旧版附件
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for asset in -macOS-arm64.app.zip -macOS-arm64.dmg -Windows-x64.exe batch-image-review-editor-macos-arm64.app.zip batch-image-review-editor-macos-arm64.dmg batch-image-review-editor-windows-x64.exe; do
            gh release delete-asset latest --yes -- "$asset" 2>/dev/null || true
          done
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 最新版
          body: |
            自动打包的最新可用版本。

            - Mac：Apple Silicon（M 系列芯片）DMG
            - Mac：Apple Silicon（M 系列芯片）app ZIP
            - Windows：64 位单文件 EXE
          make_latest: true
          overwrite_files: true
          files: |
            release/**/*.dmg
            release/**/*.zip
            release/**/*.exe
          fail_on_unmatched_files: true
